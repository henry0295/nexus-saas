[PHP]
; Configuración PHP para NexusSaaS en producción

; ─── Buffer ─────────────────────────────────────
output_buffering = 4096
implicit_flush = On

; ─── Límites ────────────────────────────────────
max_execution_time = 120
max_input_time = 60
memory_limit = 512M
post_max_size = 100M
upload_max_filesize = 100M

; ─── OPcache (Caché de bytecode) ────────────────
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.enable_cli = 0

; ─── Errores ────────────────────────────────────
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ERROR

; ─── Extensiones ────────────────────────────────
; Nota: bcmath, redis, pdo_mysql ya se instalan en el Dockerfile
; No duplicamos aquí para evitar warnings de "already loaded"

; ─── Session ────────────────────────────────────
session.save_handler = redis
session.save_path = "tcp://redis:6379?weight=1"
session.gc_maxlifetime = 1440

; ─── Date ───────────────────────────────────────
date.timezone = America/Bogota

; ─── Seguridad ──────────────────────────────────
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off
register_globals = Off
