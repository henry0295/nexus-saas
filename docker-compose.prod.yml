# ═════════════════════════════════════════════════════════════════════════════
# NexusSaaS Docker Compose — Producción
# Version: 1.0.0
# 
# Servicios:
#   • nginx    - Reverse proxy + SSL
#   • php      - PHP-FPM + Laravel
#   • mysql    - Base de datos MySQL 8
#   • redis    - Cache + Sessions  
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
# ═════════════════════════════════════════════════════════════════════════════

name: nexus-saas

services:

  # ─────────────────────────────────────────────────────────────────────────
  # MySQL 8 - Base de Datos
  # ─────────────────────────────────────────────────────────────────────────
  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    container_name: nexus_saas_mysql
    hostname: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-nexus_saas}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_password}
      MYSQL_USER: ${DB_USERNAME:-nexus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mysql_secure_password}
      TZ: ${TZ:-America/Bogota}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 80s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --slow_query_log=1
      - --slow_query_log_file=/var/log/mysql/slow-query.log
      - --long_query_time=2

  # ─────────────────────────────────────────────────────────────────────────
  # Redis - Cache + Sessions
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus_saas_redis
    hostname: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - nexus-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend - Nuxt 3 Application
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nexus_saas_frontend
    hostname: frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${APP_URL:-https://localhost}/api
      HOST: 0.0.0.0
      PORT: 3000
    networks:
      - nexus-network
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 120s

  # ─────────────────────────────────────────────────────────────────────────
  # PHP-FPM - Laravel Application
  # ─────────────────────────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: nexus_saas_php
    hostname: php
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-NexusSaaS}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-https://localhost}
      APP_KEY: ${APP_KEY:-}
      
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nexus_saas}
      DB_USERNAME: ${DB_USERNAME:-nexus_user}
      DB_PASSWORD: ${DB_PASSWORD:-mysql_secure_password}
      
      CACHE_DRIVER: file
      CACHE_STORE: file
      
      SESSION_DRIVER: file
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_password}
      REDIS_PORT: 6379
      
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      
      MAIL_DRIVER: ${MAIL_DRIVER:-log}
      MAIL_HOST: ${MAIL_HOST:-smtp.mailtrap.io}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      
      TZ: ${TZ:-America/Bogota}
      SKIP_MIGRATIONS: ${SKIP_MIGRATIONS:-false}
      RUN_SEEDERS: ${RUN_SEEDERS:-false}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/app
      - app_storage:/app/storage
      - app_bootstrap:/app/bootstrap/cache
    networks:
      - nexus-network
    healthcheck:
      test: [ "CMD", "php", "-r", "exit(extension_loaded('pdo') ? 0 : 1);" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx - Web Server + Reverse Proxy
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: nexus_saas_nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./:/app:ro
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      php:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - nexus-network
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

# ═════════════════════════════════════════════════════════════════════════════
# Volúmenes
# ═════════════════════════════════════════════════════════════════════════════
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_bootstrap:
    driver: local

# ═════════════════════════════════════════════════════════════════════════════
# Red
# ═════════════════════════════════════════════════════════════════════════════
networks:
  nexus-network:
    driver: bridge
